        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {

                        "primary-container": "#496eda",
                        "surface": "#f7f9fc",
                        "on-surface": "#191c1e",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c4c6d5",
                        "secondary": "#006d37",
                        "error": "#ba1a1a",
                        "tertiary": "#80409b"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface">
    <!-- TopAppBar -->
    <header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl flex justify-between items-center px-8 h-20 w-full shadow-sm">
        <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-blue-600">menu</span>
            <h1 class="text-blue-700 font-black tracking-tighter font-headline text-2xl">Industrial Pulse</h1>
        </div>
        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary/20">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3jWAUuKBl2fvyhvORldOGH5GJp9hgt-KKHM9oWJrior-ODz9uckh2_m0KkgF4uGaZSOC0fEAXFi44loVPPb5BleFV93n-kQSZzXVvQ_9WI33PIECmS1ulHU7euhfZfG2bEHIcXfYnVbhqYyix_hTnX4bJC1X09Wma_0cJit1cCiGy75aS8X1QElPFkogIvJKC8xcFd-8UFE6niPkGp2nO6alvpQk_-AUxBoZxfQ3encgt6cJfryURgHyaNjitUpOp3wJuInip-yUx" />
        </div>
    </header>

    <!-- NavigationDrawer (Sidebar placeholder - will be updated in all files) -->
    <aside class="h-full w-72 fixed left-0 top-0 z-40 bg-slate-50 border-r border-slate-200/10 shadow-2xl shadow-slate-900/5 pt-24 hidden lg:flex flex-col p-6 space-y-2">
        <div class="flex items-center gap-4 mb-8 px-2">
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined">person</span>
            </div>
            <div>
                <p class="font-headline font-bold text-sm" id="user-fullname">Alex Sterling</p>
                <p class="text-xs text-slate-500" id="user-role">Fabrika Müdürü</p>
            </div>
        </div>
        <nav class="flex flex-col space-y-1">
            <a href="../login_register/admin_dashboard/adminDashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 hover:translate-x-1 transition-all"><span class="material-symbols-outlined">dashboard</span><span class="font-medium text-sm">Kontrol Paneli</span></a>
            <a href="destek_merkezi.html" class="flex items-center gap-3 px-4 py-3 bg-white text-blue-700 shadow-sm rounded-2xl transition-all"><span class="material-symbols-outlined">support_agent</span><span class="font-medium text-sm">BT Destek Merkezi</span></a>
        </nav>
    </aside>

    <main class="lg:ml-72 pt-28 px-8 pb-12">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Ticket Form -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-[32px] shadow-xl border border-slate-200 overflow-hidden">
                    <div class="bg-primary p-6 text-white">
                        <h2 class="text-2xl font-headline font-bold">Yeni Destek Talebi</h2>
                        <p class="text-white/70 text-sm mt-1">Teknik sorunlarınızı buradan iletebilirsiniz.</p>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Talep Konusu</label>
                            <input type="text" id="reqTitle" placeholder="Kısa bir başlık..." class="w-full px-4 py-3 rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Departman</label>
                            <select id="reqDept" class="w-full px-4 py-3 rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm">
                                <option>Üretim</option>
                                <option>Finans</option>
                                <option>İK</option>
                                <option>Lojistik</option>
                                <option>Satın Alma</option>
                                <option>Bilgi Teknolojileri</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Açıklama</label>
                            <textarea id="reqDesc" rows="4" placeholder="Sorunu detaylandırın..." class="w-full px-4 py-3 rounded-xl border-slate-200 focus:border-primary focus:ring-primary text-sm resize-none"></textarea>
                        </div>
                        <button onclick="submitTicket()" class="w-full py-4 bg-primary text-white rounded-2xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.99] transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">send</span> Talebi Gönder
                        </button>
                        <p id="successMsg" class="hidden text-center text-green-600 text-xs font-bold animate-pulse">Talebiniz başarıyla iletildi!</p>
                    </div>
                </div>
            </div>

            <!-- Right: My Tickets & Responses -->
            <div class="lg:col-span-7 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-headline font-extrabold text-on-surface tracking-tight">Taleplerim & Yanıtlar</h2>
                    <span class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">Canlı Takip</span>
                </div>

                <div class="bg-surface-container-lowest rounded-3xl shadow-sm border border-outline-variant/10 divide-y divide-surface overflow-hidden" id="myTicketsContainer">
                    <!-- Tickets will load here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Helper to log system events
        function logSystemEvent(user, action, location, status) {
            const logs = JSON.parse(localStorage.getItem('systemLogs')) || [];
            logs.unshift({
                user: user,
                action: action,
                location: location,
                time: new Date().toISOString(),
                status: status
            });
            localStorage.setItem('systemLogs', JSON.stringify(logs.slice(0, 50)));
        }

        function submitTicket() {
            const title = document.getElementById('reqTitle').value;
            const dept = document.getElementById('reqDept').value;
            const desc = document.getElementById('reqDesc').value;

            if (!title || !desc) return alert('Lütfen zorunlu alanları doldurun!');

            const newTicket = {
                id: Date.now(),
                title: title,
                requester: 'Alex Sterling',
                dept: dept,
                time: 'Şimdi',
                priority: 'Orta',
                status: 'Beklemede',
                taskStatus: 'Başlanmadı',
                icon: 'support',
                iconClass: 'bg-primary/10 text-primary',
                assignee: 'BT Ekibi',
                assigneeColor: 'bg-slate-200 text-slate-600',
                description: desc
            };

            let tickets = JSON.parse(localStorage.getItem('it_support_tickets')) || [];
            tickets.unshift(newTicket);
            localStorage.setItem('it_support_tickets', JSON.stringify(tickets));

            // Log Event
            logSystemEvent('Alex Sterling', `IT Support Request: ${title}`, 'Support Center', 'SUCCESS');

            document.getElementById('successMsg').classList.remove('hidden');
            document.getElementById('reqTitle').value = '';
            document.getElementById('reqDesc').value = '';
            
            setTimeout(() => {
                document.getElementById('successMsg').classList.add('hidden');
                loadMyTickets();
            }, 2000);
        }

        function loadMyTickets() {
            const tickets = JSON.parse(localStorage.getItem('it_support_tickets')) || [];
            // Filter for Alex Sterling's tickets
            const myTickets = tickets.filter(t => t.requester === 'Alex Sterling');
            
            const container = document.getElementById('myTicketsContainer');
            if (myTickets.length === 0) {
                container.innerHTML = '<div class="p-12 text-center text-slate-400 font-medium">Henüz bir talebiniz bulunmuyor.</div>';
                return;
            }

            container.innerHTML = myTickets.map(t => `
                <div class="p-6 hover:bg-slate-50 transition-all">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full ${t.iconClass || 'bg-slate-100 text-slate-500'} flex items-center justify-center">
                                <span class="material-symbols-outlined">${t.icon || 'confirmation_number'}</span>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <p class="font-bold text-slate-800">${t.title}</p>
                                    <span class="px-2 py-0.5 rounded-md text-[8px] font-black uppercase ${getStatusClass(t.status)}">${t.status}</span>
                                </div>
                                <p class="text-[10px] text-slate-500">${t.time} • ${t.dept}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Süreç Durumu</p>
                            <p class="text-xs font-black text-primary mt-1">${(t.taskStatus || 'Hazırlanıyor').toUpperCase()}</p>
                        </div>
                    </div>
                    
                    ${t.status === 'Reddedildi' && t.rejectionReason ? `
                        <div class="mt-4 p-4 bg-red-50 rounded-2xl border border-red-100">
                            <p class="text-[10px] font-bold text-red-600 uppercase mb-1">BT Yanıtı (Red Nedeni)</p>
                            <p class="text-xs text-red-800">${t.rejectionReason}</p>
                        </div>
                    ` : ''}

                    ${t.status === 'Onaylandı' ? `
                        <div class="mt-4 p-4 bg-green-50 rounded-2xl border border-green-100">
                            <p class="text-[10px] font-bold text-green-600 uppercase mb-1">BT Yanıtı</p>
                            <p class="text-xs text-green-800">Talebiniz onaylandı ve iş listesine alındı. BT Uzmanı: ${t.assignee}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'Onaylandı') return 'bg-green-100 text-green-700';
            if (status === 'Reddedildi') return 'bg-red-100 text-red-700';
            if (status === 'İnceleniyor') return 'bg-blue-100 text-blue-700';
            return 'bg-slate-100 text-slate-500';
        }

        document.addEventListener('DOMContentLoaded', loadMyTickets);
        // Polling for updates every 5 seconds to simulate real-time response
        setInterval(loadMyTickets, 5000);
    </script>
<script src="../login_register/userLoader.js"></script>
</body>
</html>
