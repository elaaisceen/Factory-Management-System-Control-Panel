<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çıkış - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #bec6ea 0%, rgba(255, 255, 255, 0.7) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logout-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .logout-container h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .logout-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .logout-btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }

        .logout-btn:active {
            transform: translateY(0);
        }

        .cancel-btn {
            background-color: #95a5a6;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .cancel-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            font-weight: bold;
        }

        .status-message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h1>Çıkış Yap</h1>
        <p>Oturumunuzu sonlandırmak istediğinize emin misiniz?</p>
        <p style="font-size: 14px; color: #999;">Lütfen verilerinizi kaydettiğinizden emin olun. Tüm oturum verileri silinecektir.</p>
        
        <div class="button-group">
            <button class="logout-btn" id="confirmLogout">Evet, Çıkış Yap</button>
            <button class="cancel-btn" id="cancelLogout">İptal</button>
        </div>
        
        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // Çıkış butonuna tıklandığında
        document.getElementById('confirmLogout').addEventListener('click', function() {
            performLogout();
        });

        // İptal butonuna tıklandığında
        document.getElementById('cancelLogout').addEventListener('click', function() {
            // Önceki sayfaya geri dön
            window.history.back();
        });

        function performLogout() {
            try {
                // LocalStorage'dan tüm verileri sil
                localStorage.clear();
                
                // SessionStorage'dan tüm verileri sil
                sessionStorage.clear();
                
                // Cookies'i sil
                deleteCookies();
                
                // Başarı mesajı göster
                showMessage('Oturumunuz başarıyla sonlandırıldı. Yeniden yönlendiriliyorsunuz...', 'success');
                
                // 2 saniye sonra login sayfasına yönlendir
                setTimeout(function() {
                    window.location.href = '../index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Çıkış sırasında hata oluştu:', error);
                showMessage('Çıkış sırasında bir hata oluştu. Lütfen tekrar deneyiniz.', 'error');
            }
        }

        function deleteCookies() {
            // Tüm cookies'i sil
            const cookies = document.cookie.split(';');
            
            cookies.forEach(function(cookie) {
                const eqPos = cookie.indexOf('=');
                const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
                
                if (name) {
                    document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
                }
            });
        }

        function showMessage(message, type) {
            const statusElement = document.getElementById('statusMessage');
            statusElement.textContent = message;
            statusElement.className = 'status-message ' + type;
            statusElement.style.display = 'block';
        }

        // Sayfa yüklendiğinde oturum kontrolü
        window.addEventListener('load', function() {
            // Opsiyonel: Eğer kullanıcı zaten oturum açmamışsa login sayfasına yönlendir
            const isLoggedIn = localStorage.getItem('isLoggedIn') || sessionStorage.getItem('isLoggedIn');
            
            if (!isLoggedIn) {
                // Kullanıcı oturum açmamışsa, login sayfasına yönlendir
                // window.location.href = '../login_register/loginRegister.html';
            }
        });
    </script>
</body>
</html>
