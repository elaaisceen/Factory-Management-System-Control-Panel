<body>
    <section class="flex-1 p-8 md:p-12 lg:p-16 bg-white relative overflow-hidden">
<!-- Decorative background for Register side -->
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
<div class="relative z-10 flex flex-col h-full">
<div class="mb-10">
<button class="bg-on-surface-variant/10 text-on-surface-variant px-5 py-2 rounded-full text-sm font-bold flex items-center hover:bg-on-surface-variant/20 transition-all">
<span class="material-symbols-outlined text-sm mr-2" data-icon="person_add">person_add</span>
                        Yeni Üye Kaydı
                    </button>
<h2 class="font-headline font-bold text-3xl text-on-surface mt-6">Hesap Oluştur</h2>
<p class="text-on-surface-variant text-sm mt-2">Endüstriyel ekosistemimize hemen katılın.</p>
</div>

<!--Kişisel Bilgiler-->
<form class="space-y-5 flex-1 overflow-y-auto pr-2 custom-scrollbar">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Ad</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="Mehmet" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Soyad</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="Yılmaz" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">E-Posta</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="mehmet.yilmaz@fabrika.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Telefon Numarası</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="0555 123 45 67" type="tel"/>
</div>

<!--Cinsiyet-->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Cinsiyet</label>
<select class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm text-on-surface appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23747684%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px] bg-[right_1rem_center] bg-no-repeat">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="erkek">Erkek</option>
<option value="kadın">Kadın</option>
<option value="belirsiz">Belirtmek İstemiyorum</option>
</select>
</div>

<!--Askerlik Durumu-->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Askerlik Durumu (Erkek Adaylar İçin)</label>
<select class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm text-on-surface appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23747684%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px] bg-[right_1rem_center] bg-no-repeat">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="erkek">Yapıldı</option>
<option value="kadın">Yapılmadı</option>
<option value="belirsiz">Muaf</option>
</select>
</div>
 
<!--Mezuniyet Bilgisi-->
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Mezuniyet Bilgisi</label>
<select class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm text-on-surface appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23747684%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px] bg-[right_1rem_center] bg-no-repeat">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="lise">Lise</option>
<option value="on_lisans">Ön Lisans</option>
<option value="lisans">Lisans</option>
<option value="yuksek_lisans">Yüksek Lisans</option>
<option value="doktora">Doktora</option>
</select>
</div>

<!--Rütbe-->
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Firmamızdaki Pozisyonunuz</label>
<select class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm text-on-surface appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23747684%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px] bg-[right_1rem_center] bg-no-repeat">
<option disabled="" selected="" value="">Seçiniz</option>
<option value="1">Genel Müdür</option>
<option value="2">Geliştirici / Admin</option>
<option value="3">Bilgi Teknolojileri Personeli</option>
<option value="4">Bilgi Teknolojileri Yöneticisi</option>
<option value="5">İnsan Kaynakları Personeli</option>
<option value="6">İnsan Kaynakları Yöneticisi</option>
<option value="7">Depo Personeli</option>
<option value="8">Depo Yöneticisi</option>
<option value="9">Üretim Personeli</option>
<option value="10">Üretim Yöneticisi</option>
<option value="11">Finans Personeli</option>
<option value="12">Finans Yöneticisi</option>
<option value="13">Satın Alma Personeli</option>
<option value="14">Satın Alma Yöneticisi</option>
</select>
</div>

<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">CV Yükle</label>
<div class="relative">
<input class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept=".pdf,.doc,.docx" type="file" id="cvFile"/>
<div class="input-inset border-none rounded-lg py-3 px-4 focus-within:ring-2 focus-within:ring-secondary/20 transition-all font-medium text-sm flex items-center justify-between">
<div class="flex items-center">
<span class="material-symbols-outlined text-outline mr-3 text-lg" data-icon="upload_file">upload_file</span>
<span id="fileName" class="text-outline-variant">CV dosyanızı seçin (PDF, DOC, DOCX)</span>
</div>
<span class="material-symbols-outlined text-outline text-sm" data-icon="attach_file">attach_file</span>
</div>
</div>
<div class="text-xs text-outline-variant mt-1 px-1">Maksimum dosya boyutu: 5MB</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Şifre</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-bold uppercase tracking-widest text-outline px-1">Şifre Onay</label>
<input class="w-full input-inset border-none rounded-lg py-3 px-4 focus:ring-2 focus:ring-secondary/20 transition-all font-medium text-sm" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4 flex flex-col gap-4">
<button class="w-full bg-secondary text-white py-4 rounded-lg font-headline font-bold text-lg shadow-lg shadow-secondary/20 hover:shadow-secondary/30 active:scale-95 transition-all" type="submit">
                            Kayıt Ol
                        </button>
<div class="flex items-center gap-2 px-2">
<input class="rounded text-secondary focus:ring-secondary/20 w-4 h-4 border-outline-variant" type="checkbox"/>
<span class="text-xs text-outline leading-tight font-medium">Kullanım koşullarını ve gizlilik politikasını kabul ediyorum.</span>
</div>
</div>
</form>
<div class="mt-8 pt-6 border-t border-surface-container text-center">
<p class="text-sm text-on-surface-variant">Zaten bir hesabınız var mı? <a class="text-primary font-bold hover:underline" href="loginRegister.html">Giriş Yapın</a></p>
</div>
</div>
</section>
