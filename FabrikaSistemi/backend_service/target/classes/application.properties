spring.datasource.url=jdbc:mysql://localhost:3306/fabrika_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Web sunucu portu
server.port=8080

# Otomatik Schema Yükleme (Veritabanını Müşteriye Hazırlama)
spring.sql.init.mode=always
spring.sql.init.data-locations=file:../../database/schema_mysql.sql
